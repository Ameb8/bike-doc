services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    command:
      - uv
      - run
      - uvicorn
      - bike_doc_api.main:app
      - --host
      - 0.0.0.0
      - --port
      - ${BIKE_DOC_API_PORT}
      - --reload
      - --reload-dir
      - /workspace/apps/api/src
      - --reload-dir
      - /workspace/docs/specs
    environment:
      BIKE_DOC_API_APP_NAME: ${BIKE_DOC_API_APP_NAME}
      BIKE_DOC_API_ENVIRONMENT: ${BIKE_DOC_API_ENVIRONMENT}
      BIKE_DOC_API_DEBUG: ${BIKE_DOC_API_DEBUG}
      BIKE_DOC_API_CORS_ORIGINS: ${BIKE_DOC_API_CORS_ORIGINS}
      BIKE_DOC_API_DATABASE_URL: ${BIKE_DOC_API_DATABASE_URL}
      BIKE_DOC_API_LOG_LEVEL: ${BIKE_DOC_API_LOG_LEVEL}
      BIKE_DOC_API_LOG_FORMAT: ${BIKE_DOC_API_LOG_FORMAT}
    ports:
      - "${BIKE_DOC_API_PORT}:${BIKE_DOC_API_PORT}"
    volumes:
      - ./apps/api:/workspace/apps/api
      - ./docs:/workspace/docs:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
